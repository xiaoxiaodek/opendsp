services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opendsp
      POSTGRES_USER: opendsp
      POSTGRES_PASSWORD: opendsp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendsp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    # Admin UI: http://localhost:9333/
    # S3 API:  http://localhost:9000/
    command: server -s3 -filer -dir=/data -s3.port=9000 -filer.port=8888 -volume.max=0 -master.volumeSizeLimitMB=1024
    ports:
      - "9000:9000"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfsdata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  ad-server:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      APP_DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      APP_REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ad-manager:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-manager
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      APP_SERVER_PORT: "8081"
      APP_DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      FILE_GATEWAY_ADDR: file-gateway:9092
      AI_ENABLED: "true"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ad-syncer:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-syncer
    environment:
      APP_DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      APP_REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  feature-store:
    build:
      context: .
      target: backend
    command: /usr/local/bin/feature-store
    environment:
      APP_REDIS_ADDR: redis:6379
      APP_KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: feature-store
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  roi-daemon:
    build:
      context: .
      target: backend
    command: /usr/local/bin/roi-daemon
    environment:
      APP_DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      APP_ROI_OXBI_TARGET_ROAS: "2.0"
      APP_ROI_PID_KP: "0.3"
      APP_ROI_PID_KI: "0.05"
      APP_ROI_PID_KD: "0.1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  clickhouse-writer:
    build:
      context: .
      target: backend
    command: /usr/local/bin/clickhouse-writer
    environment:
      APP_KAFKA_BROKERS: kafka:9092
      APP_CLICKHOUSE_HOST: clickhouse
      APP_CLICKHOUSE_PORT: "9000"
      APP_CLICKHOUSE_DATABASE: opendsp
      APP_CLICKHOUSE_USERNAME: opendsp
      APP_CLICKHOUSE_PASSWORD: opendsp
    depends_on:
      clickhouse:
        condition: service_started
      kafka:
        condition: service_started

  consul:
    image: hashicorp/consul:1.19
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0

  frontend:
    build:
      context: .
      target: frontend-dev
    ports:
      - "3001:5173"
    volumes:
      - ./web/src:/web/src
      - ./web/vite.config.ts:/web/vite.config.ts
      - ./web/index.html:/web/index.html
      - ./web/pnpm-lock.yaml:/web/pnpm-lock.yaml
      - /web/node_modules
    environment:
      VITE_API_TARGET: http://ad-manager:8081
      VITE_ASSETS_BASE_URL: http://file-gateway:9001
    depends_on:
      - ad-manager

  prometheus:
    image: prom/prometheus
    ports:
      - "9094:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml

  file-gateway:
    build:
      context: .
      target: backend
    command: /usr/local/bin/file-gateway
    ports:
      - "9001:9001"
      - "9093:9092"
    environment:
      APP_DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      APP_STORAGE_BACKEND: s3
      APP_STORAGE_ENDPOINT: http://seaweedfs:9000
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy


  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "opendsp-cluster-001"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      - CLICKHOUSE_DB=opendsp
      - CLICKHOUSE_USER=opendsp
      - CLICKHOUSE_PASSWORD=opendsp
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  pgdata:
  seaweedfsdata:
  kafka_data:
  clickhouse_data:
