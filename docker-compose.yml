services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opendsp
      POSTGRES_USER: opendsp
      POSTGRES_PASSWORD: opendsp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendsp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    # Admin UI: http://localhost:9333/
    # S3 API:  http://localhost:9000/
    command: server -s3 -filer -dir=/data -s3.port=9000 -filer.port=8888 -volume.max=0 -master.volumeSizeLimitMB=1024
    ports:
      - "9000:9000"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfsdata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  ad-server:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ad-manager:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-manager
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      REDIS_URL: redis:6379
      FILE_GATEWAY_ADDR: file-gateway:9092
      AI_ENABLED: "true"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ad-syncer:
    build:
      context: .
      target: backend
    command: /usr/local/bin/ad-syncer
    environment:
      DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      target: frontend-dev
    ports:
      - "3001:5173"
    volumes:
      - ./web/src:/web/src
      - ./web/vite.config.ts:/web/vite.config.ts
      - ./web/index.html:/web/index.html
      - ./web/pnpm-lock.yaml:/web/pnpm-lock.yaml
      - /web/node_modules
    environment:
      VITE_API_TARGET: http://ad-manager:8081
      VITE_ASSETS_BASE_URL: http://file-gateway:9001
    depends_on:
      - ad-manager

  prometheus:
    image: prom/prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml

  file-gateway:
    build:
      context: .
      target: backend
    command: /usr/local/bin/file-gateway
    ports:
      - "9001:9001"
      - "9093:9092"
    environment:
      DATABASE_URL: postgres://opendsp:opendsp@postgres:5432/opendsp?sslmode=disable
      REDIS_URL: redis:6379
      STORAGE_BACKEND: s3
      STORAGE_ENDPOINT: http://seaweedfs:9000
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

volumes:
  pgdata:
  seaweedfsdata:
