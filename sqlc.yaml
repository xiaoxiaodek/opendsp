version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema:
      - "migrations/001_init.up.sql"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/data/dbsqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_params_struct_pointers: true
        emit_result_struct_pointers: true
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
