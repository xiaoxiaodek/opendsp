apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ad-server
  labels:
    app: ad-server
spec:
  replicas: {{ .Values.adServer.replicas }}
  selector:
    matchLabels:
      app: ad-server
  template:
    metadata:
      labels:
        app: ad-server
    spec:
      containers:
        - name: ad-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/ad-server"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db
                  key: url
            - name: REDIS_URL
              value: {{ .Release.Name }}-redis-master:6379
          resources:
            {{- toYaml .Values.adServer.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ad-server
spec:
  selector:
    app: ad-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
{{- if .Values.adServer.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-ad-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-ad-server
  minReplicas: {{ .Values.adServer.hpa.minReplicas }}
  maxReplicas: {{ .Values.adServer.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.adServer.hpa.targetCPU }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}
